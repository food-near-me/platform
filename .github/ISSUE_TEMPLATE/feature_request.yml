name: Feature request
description: Suggest an improvement or new capability
title: "[Feature] "
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What problem are we solving?
      placeholder: As a user, I cannot...
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: What should we build?
      placeholder: We should add...
    validations:
      required: true
  - type: textarea
    id: success
    attributes:
      label: Success criteria
      description: How do we know this worked?
      placeholder: Example metrics or user outcomes
  - type: dropdown
    id: priority
    attributes:
      label: Priority
      options:
        - P0 - critical
        - P1 - high
        - P2 - medium
        - P3 - low
    validations:
      required: true
