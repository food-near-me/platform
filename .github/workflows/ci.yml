name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  verify:
    runs-on: ubuntu-latest
    env:
      NEXT_PUBLIC_APP_URL: https://foodnear.me
      NEXT_PUBLIC_SUPABASE_URL: https://example.supabase.co
      NEXT_PUBLIC_SUPABASE_ANON_KEY: test-anon-key
      SUPABASE_SERVICE_ROLE_KEY: test-service-role-key
      RESEND_API_KEY: test-resend-api-key
      LEADS_NOTIFICATION_TO: team@example.com
      LEADS_FROM_EMAIL: noreply@example.com
      LEADS_ALLOWED_ORIGINS: https://foodnear.me
      X402_RECIPIENT_WALLET: test-wallet
      USDC_CONTRACT_ADDRESS: 0x0000000000000000000000000000000000000000
      BASE_CHAIN_ID: "8453"
      STRIPE_SECRET_KEY: test-stripe-key
      STRIPE_WEBHOOK_SECRET: test-webhook-secret
      DOMA_API_KEY: test-doma-key
      THIRDWEB_SECRET_KEY: test-thirdweb-key
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci --include=optional

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Build
        run: npm run build

      - name: Discovery copy parity
        run: npm run check:discovery-copy

  mcp-contract:
    name: MCP contract (PR)
    runs-on: ubuntu-latest
    needs: verify
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci --include=optional

      - name: Build
        run: npm run build

      - name: Start production server
        run: |
          npm run start -w web &
          echo $! > /tmp/fnm-next.pid

      - name: Wait for /mcp
        run: |
          for i in $(seq 1 30); do
            if curl -sf "http://localhost:3000/mcp" -o /dev/null; then
              echo "MCP ready"
              exit 0
            fi
            sleep 2
          done
          echo "MCP did not become ready in time"
          exit 1

      - name: MCP smoke + flow tests
        run: |
          npm run check:discovery-copy
          BASE_URL=http://localhost:3000 npm run smoke:mcp
          MCP_URL=http://localhost:3000 npm run test:mcp-flows
